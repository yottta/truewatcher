version: 2

project_name: truewatcher

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/truewatcher
    goos:
      - "linux"
      - "darwin"
    goarch:
      - "amd64"
      - "arm64"
signs:
  - artifacts: checksum
    cmd: gpg2
    args:
      - "--batch"
      - "-u"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

archives:
  - formats: [ 'tar.gz' ]
    id: targz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{- .Os }}_{{- .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github-native

dockers_v2:
  - id: truewatcher
    dockerfile: Dockerfile-goreleaser
    images:
      - "yottta/truewatcher"
    tags:
      - "v{{ .Version }}"
    labels:
      "org.opencontainers.image.description": "truewatcher"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
    # For the moment we build only for one platform since the GH docker driver does not support multi platform builds.
    platforms:
      - linux/amd64
#      - linux/arm64
    # Disabling sbom for the moment since the GH docker driver does not support attestations
    # sbom: "{{ not .IsNightly }}"
    sbom: false
    # Retry configuration.
    retry:
      # Attempts of retry.
      attempts: 2
      # Delay between retry attempts.
      delay: 10s
      # Maximum delay between retry attempts.
      max_delay: 2m
